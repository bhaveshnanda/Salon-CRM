<div class="top-bar">
  <h2>Clients</h2>

  <a routerLink="/clients/new" class="add-btn"> + Add Client </a>
</div>


<div class="table-card">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let item of clients">
        <td>{{ item.name }}</td>

        <td>{{ item.phone }}</td>

        <td>{{ item.email }}</td>

        <td>
          <button class="delete-btn" (click)="deleteClient(item.id)">
            Delete
          </button>
        </td>
      </tr>

      <tr *ngIf="clients.length === 0">
        <td colspan="4">No clients found</td>
      </tr>
    </tbody>
  </table>
</div>
